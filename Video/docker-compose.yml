version: "3.9"

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    network_mode: "host"

  video-container:
    build:
      context: /home/brother/video_container
    container_name: video-container-api
    restart: unless-stopped
    network_mode: "host"
    devices:
      - "/dev/video0:/dev/video0"
    volumes:
      - /mnt/usb:/recordings